name: Terraform-Ansible Deployment

on:
  push:
    branches:
      - main

env:
  # Opt into Node.js 24 to fix the deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          # Using individual secrets here to avoid JSON nesting errors
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

          
      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve

      - name: Get VM Public IP
        id: tf_output
        run: |
          VM_IP=$(terraform -chdir=terraform output -raw vm_ip)
          echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Use -p 22 or your specific port if changed
          ssh-keyscan -H ${{ steps.tf_output.outputs.vm_ip }} >> ~/.ssh/known_hosts

      - name: Run Ansible Playbook
        run: |
          mkdir -p ansible
          echo "[prometheus]" > ansible/inventory.ini
          echo "${{ steps.tf_output.outputs.vm_ip }} ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa" >> ansible/inventory.ini
          ansible-playbook -i ansible/inventory.ini ansible/playbook.yml \
            --extra-vars "ansible_ssh_common_args='-o StrictHostKeyChecking=no'"